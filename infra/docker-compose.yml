services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/marketplace}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment:8001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app

  payment:
    build:
      context: ../payment
      dockerfile: Dockerfile
      target: runner
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      PAYMENT_DB_DSN: ${PAYMENT_DB_DSN:-postgres://postgres:postgres@postgres:5432/marketplace?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
      - payment

  # Builder-stage container used only for `go test` — has Go toolchain
  payment-test:
    build:
      context: ../payment
      dockerfile: Dockerfile
      target: builder
    working_dir: /app
    command: go test ./... -v
    profiles:
      - test

volumes:
  pgdata:
