name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/app/

  python-sast:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r backend/app/ -ll

  python-sca:
    name: Python SCA (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements.txt

  python-tests:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marketplace
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/marketplace
          JWT_SECRET: test-secret-that-is-long-enough-32ch
          PAYMENT_SERVICE_URL: http://localhost:8001
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  go-lint:
    name: Go Lint (gofmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Tidy modules
        working-directory: payment
        run: go mod tidy
      - name: Check gofmt
        working-directory: payment
        run: test -z "$(gofmt -l .)"

  go-sast:
    name: Go SAST (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Tidy modules
        working-directory: payment
        run: go mod tidy
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - working-directory: payment
        run: gosec ./...

  go-sca:
    name: Go SCA (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Tidy modules
        working-directory: payment
        run: go mod tidy
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - working-directory: payment
        run: govulncheck ./...

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marketplace
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Tidy modules
        working-directory: payment
        run: go mod tidy
      - name: Run go test
        working-directory: payment
        env:
          PAYMENT_DB_DSN: postgres://postgres:postgres@localhost:5432/marketplace?sslmode=disable
        run: go test ./... -v -race -coverprofile=coverage.out
